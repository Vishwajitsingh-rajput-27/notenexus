services:
  - type: web
    name: notenexus-backend
    runtime: node
    region: oregon
    plan: free
    # yt-dlp is needed to fetch YouTube transcripts from cloud IPs that YouTube blocks.
    # We download the pre-built binary directly — no Python/pip required.
    buildCommand: >
      npm install --ignore-optional &&
      curl -fsSL https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp
      -o /usr/local/bin/yt-dlp &&
      chmod a+rx /usr/local/bin/yt-dlp
    startCommand: npm start
    healthCheckPath: /ping
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 7d
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX_NAME
        value: notenexus
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_NUMBER
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      # Optional: Supadata transcript API key (free tier: 500 req/month)
      # Sign up at https://supadata.ai — used as fallback if yt-dlp fails
      - key: SUPADATA_API_KEY
        sync: false
